<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key Interactions Timeline — Version A</title>
<!--
  KEY INTERACTIONS TIMELINE — VERSION A (No Visualization)
  User testing stimulus — org scope, hardcoded, no prototype controls
  List + date range picker + filter pills + search
-->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.3.2/mdb.min.css">
<style>
:root {
  --font-body: Roboto, sans-serif;
  --font-heading: Roboto, sans-serif;
  --app-bg: #F5F5F5;
  --surface: #FFFFFF;
  --primary: #2D3B4A;
  --primary-hover: #424F5C;
  --primary-pressed: #57626E;
  --outline-hover: #EAEAED;
  --border-color: #E0E0E0;
  --border: 1px solid #E0E0E0;
  --radius: 6px;
  --form-radius: 4px;
  --pill: 999px;
  --sidebar-active: #D5E2FA;
  --sidebar-hover: #F5F5F5;
  --link: #1B76D2;
  --gap: 16px;
  --nav-height: 55px;
  --sidebar-width: 250px;
  --neutral-30: #616161;
  --neutral-40: #757575;
  --neutral-50: #BDBDBD;
  --neutral-60: #E0E0E0;
  --neutral-70: #EEEEEE;
  --neutral-80: #F5F5F5;
  --neutral-90: #FAFAFA;
  --state-dark-hover: #424F5C;
  --state-light-hover: #EAEAED;
  --success-0: #67CF9D; --success-50: #E1F5EB;
  --danger-0: #BD3B39;  --danger-50: #FCDDDD;
  --warning-0: #F4C862; --warning-50: #FFF4D1;
  --info-0: #536E8A;    --info-50: #D5E2FA;
  --mdb-primary: #2D3B4A;
  --mdb-body-bg: #F5F5F5;
  --mdb-body-color: #2D3B4A;
  --mdb-border-color: #E0E0E0;
  --mdb-border-radius: 6px;
  --mdb-border-radius-pill: 999px;
  --mdb-font-sans-serif: Roboto, sans-serif;
  --mdb-link-color: #1B76D2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); font-size: 16px; background: var(--app-bg); color: var(--primary); }
h1,h2,h3,h4,h5,h6 { font-family: var(--font-heading); font-weight: 500; color: var(--primary); }
a { color: var(--link); text-decoration: none; }
svg { display: inline-block; vertical-align: middle; flex-shrink: 0; }

/* NAVBAR */
.ft-navbar {
  background: var(--surface); border-bottom: var(--border);
  height: var(--nav-height); padding: 0 20px;
  display: flex; align-items: center; gap: 18px;
  position: sticky; top: 0; z-index: 200;
}
.ft-navbar__logo {
  width: 36px; height: 36px; background: var(--primary);
  border-radius: var(--radius); display: flex; align-items: center;
  justify-content: center; font-family: var(--font-heading);
  font-weight: 700; font-size: 11px; color: #fff; flex-shrink: 0;
}
.ft-navbar__item {
  font-family: var(--font-heading); font-weight: 500; font-size: 0.8rem;
  color: var(--primary); text-transform: uppercase; background: none;
  border: none; cursor: pointer; white-space: nowrap;
  display: flex; align-items: center; gap: 3px;
}
.ft-navbar__search {
  flex: 1; max-width: 420px; border: var(--border);
  border-radius: var(--form-radius); padding: 5px 12px;
  display: flex; align-items: center; gap: 8px;
  font-size: 0.85rem; color: #bbb; background: var(--surface);
}
.ft-navbar__spacer { flex: 1; }
.ft-navbar__role {
  font-family: var(--font-heading); font-weight: 500; font-size: 0.8rem;
  color: var(--primary); background: none; border: none; cursor: pointer;
  display: flex; align-items: center; gap: 3px; white-space: nowrap;
}
.ft-navbar__utils { display: flex; align-items: center; gap: 14px; }
.ft-navbar__utils svg { cursor: pointer; }

/* PAGE */
.ft-page { display: flex; background: var(--app-bg); min-height: calc(100vh - var(--nav-height)); }
.ft-content { flex: 1; padding: 24px; min-width: 0; }

/* SIDEBAR */
.ft-sidebar {
  width: var(--sidebar-width); background: var(--surface);
  border-right: var(--border); flex-shrink: 0; padding-top: 8px;
}
.ft-sidebar__contact {
  background: #EBEBEB; border-radius: var(--radius);
  padding: 12px; margin: 8px 10px 15px;
  box-shadow: 0 2px 8px 2px rgba(0,0,0,0.08);
}
.ft-sidebar__contact-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.ft-sidebar__contact-row:last-child { margin-bottom: 0; }
.ft-sidebar__contact-row svg { flex-shrink: 0; color: var(--primary); }
.ft-sidebar__contact-row span {
  font-size: 0.7rem; color: var(--primary);
  text-transform: uppercase; font-family: var(--font-body); font-weight: 400; word-break: break-all;
}
.ft-sidebar__item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; cursor: pointer; font-size: 0.875rem;
  font-family: var(--font-body); color: var(--primary); font-weight: 400;
  background: transparent; border: none; width: 100%; text-align: left; transition: background 0.1s;
}
.ft-sidebar__item:hover { background: var(--sidebar-hover); font-weight: 700; }
.ft-sidebar__item.active { background: var(--sidebar-active); font-weight: 700; }
.ft-sidebar__label { flex: 1; }
.ft-sidebar__count {
  background: var(--primary); color: #fff; border-radius: var(--pill);
  font-size: 0.65rem; font-weight: 700; padding: 1px 7px; font-family: var(--font-heading);
}

/* RECORD HEADER */
.ft-record-header {
  margin-bottom: 20px;
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
}
.ft-record-header__main { flex: 1; min-width: 0; }
.ft-record-header__actions { flex-shrink: 0; padding-top: 4px; }
.ft-record-header h1 { font-size: 1.75rem; font-weight: 500; display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.ft-record-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; font-size: 0.85rem; color: #666; }
.ft-record-meta .org { font-weight: 600; color: var(--primary); }
.ft-record-meta .sep { color: #ccc; }

/* BADGES */
.ft-badge { display: inline-block; border-radius: var(--pill); font-size: 0.75rem; font-weight: 500; padding: 2px 10px; white-space: nowrap; color: var(--primary); font-family: var(--font-body); }
.ft-badge--approved, .ft-badge--clear { background: var(--success-50); }
.ft-badge--manual, .ft-badge--upcoming { background: var(--info-50); }
.ft-badge--overdue, .ft-badge--loi-draft { background: var(--danger-50); }
.ft-badge--pending, .ft-badge--draft { background: var(--warning-50); }

/* BUTTONS */
.btn-ft-filled, .btn-ft-outline {
  border-radius: var(--pill); font-family: var(--font-heading); font-weight: 700;
  cursor: pointer; border: 2px solid var(--primary);
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.75rem; padding: 4px 14px 3px; transition: background 0.1s;
}
.btn-ft-filled { background: var(--primary); color: #fff; }
.btn-ft-filled:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
.btn-ft-outline { background: transparent; color: var(--primary); }
.btn-ft-outline:hover { background: var(--outline-hover); }
.btn-ft-default { font-size: 0.875rem; padding: 5px 12px; }
.btn-ft-sm { font-size: 0.75rem; padding: 4px 14px 3px; }

/* SECTION WRAPPER */
.ki-section { background: var(--surface); border: var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: var(--gap); }

/* TOP CONTROL BAR */
.ki-topbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.ki-search-wrap {
  flex: 1; min-width: 240px; border: var(--border); border-radius: var(--form-radius);
  padding: 5px 12px; display: flex; align-items: center; gap: 8px;
  font-size: 0.85rem; color: #bbb; background: var(--surface);
}
.ki-search-wrap input {
  border: none; outline: none; flex: 1; font-family: var(--font-body);
  font-size: 0.85rem; color: var(--primary); background: transparent;
}
.ki-search-wrap input::placeholder { color: #bbb; }

/* VIEW SWITCHER */
.ki-viewswitch {
  display: inline-flex; align-items: center; gap: 0;
  border: 1px solid var(--primary); border-radius: var(--pill); overflow: hidden;
}
.ki-viewswitch button {
  background: transparent; color: var(--primary);
  border: none; padding: 4px 14px; cursor: pointer;
  font-family: var(--font-heading); font-weight: 700; font-size: 0.75rem;
  display: inline-flex; align-items: center; gap: 6px;
}
.ki-viewswitch button:hover { background: var(--outline-hover); }
.ki-viewswitch button.active { background: var(--primary); color: #fff; }
.ki-viewswitch__count {
  font-size: 0.65rem; font-weight: 700; opacity: 0.75;
  padding: 1px 6px; border-radius: var(--pill);
  background: rgba(0,0,0,0.08);
}
.ki-viewswitch button.active .ki-viewswitch__count { background: rgba(255,255,255,0.2); }

/* FILTER PILLS */
.ki-filters { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.ki-filters__label {
  font-family: var(--font-heading); font-weight: 500;
  font-size: 0.75rem; color: var(--neutral-30);
  text-transform: uppercase; letter-spacing: 0.04em;
  margin-right: 4px;
}
.ki-pill {
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid var(--primary); border-radius: var(--pill);
  background: var(--surface); color: var(--primary);
  font-family: var(--font-body); font-weight: 500; font-size: 0.8rem;
  padding: 3px 11px; cursor: pointer; transition: background 0.1s, color 0.1s;
  user-select: none;
}
.ki-pill:hover { background: var(--outline-hover); }
.ki-pill.active { background: var(--primary); color: #fff; }
.ki-pill.active svg { color: #fff; }
.ki-pill svg { color: var(--primary); }
.ki-pill[disabled], .ki-pill.disabled {
  border-color: var(--neutral-50); color: var(--neutral-40);
  background: var(--surface); cursor: not-allowed; opacity: 0.6;
}
.ki-pill[disabled]:hover, .ki-pill.disabled:hover { background: var(--surface); }
.ki-pill__count {
  font-size: 0.7rem; font-weight: 700; padding-left: 4px;
  font-family: var(--font-heading); opacity: 0.7;
}

/* DATE RANGE PICKER */
.ki-nav-wrap {
  background: var(--surface); border: var(--border); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: var(--gap);
}
.ki-versionA__bar { display: flex; align-items: center; gap: 10px; }
.ki-versionA__label {
  font-family: var(--font-heading); font-weight: 500; font-size: 0.75rem;
  color: var(--neutral-30); text-transform: uppercase; letter-spacing: 0.04em;
}
.ki-daterange { position: relative; }
.ki-daterange__trigger {
  display: inline-flex; align-items: center; gap: 8px;
  border: 1px solid var(--primary); border-radius: var(--pill);
  background: var(--surface); color: var(--primary);
  font-family: var(--font-heading); font-weight: 500; font-size: 0.85rem;
  padding: 5px 14px; cursor: pointer;
}
.ki-daterange__trigger:hover { background: var(--outline-hover); }
.ki-daterange__popover {
  position: absolute; top: calc(100% + 6px); left: 0;
  background: var(--surface); border: var(--border); border-radius: var(--radius);
  box-shadow: 0 4px 16px rgba(0,0,0,0.10);
  min-width: 320px; z-index: 10; display: none;
  padding: 14px 16px;
}
.ki-daterange__popover.open { display: block; }
.ki-daterange__section { display: flex; flex-direction: column; gap: 8px; }
.ki-daterange__section-label {
  font-family: var(--font-heading); font-weight: 500; font-size: 0.7rem;
  color: var(--neutral-30); text-transform: uppercase; letter-spacing: 0.04em;
}
.ki-daterange__presets { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.ki-daterange__presets button {
  background: var(--surface); border: 1px solid var(--neutral-60);
  border-radius: var(--form-radius); padding: 6px 10px;
  font-family: var(--font-body); font-weight: 400; font-size: 0.8rem;
  color: var(--primary); cursor: pointer; text-align: left;
}
.ki-daterange__presets button:hover { background: var(--outline-hover); }
.ki-daterange__presets button.active { background: var(--info-50); border-color: var(--info-0); font-weight: 500; }
.ki-daterange__divider { height: 1px; background: var(--border-color); margin: 12px 0; }
.ki-daterange__custom { display: flex; flex-direction: column; gap: 8px; }
.ki-daterange__custom label {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-body); font-size: 0.8rem; color: var(--primary);
}
.ki-daterange__custom input[type="date"] {
  flex: 1; border: 1px solid var(--neutral-60); border-radius: var(--form-radius);
  padding: 4px 8px; font-family: var(--font-body); font-size: 0.85rem;
  color: var(--primary); background: var(--surface);
}
.ki-daterange__custom input[type="date"]:focus {
  border-color: var(--primary); outline: none;
  box-shadow: 0 0 0 1px var(--primary);
}
.ki-daterange__apply {
  align-self: flex-end;
  background: var(--primary); color: #fff;
  border: 2px solid var(--primary); border-radius: var(--pill);
  font-family: var(--font-heading); font-weight: 700; font-size: 0.75rem;
  padding: 4px 14px; cursor: pointer;
}
.ki-daterange__apply:hover { background: var(--primary-hover); border-color: var(--primary-hover); }

/* SCOPED-RANGE BANNER */
.ki-scoped {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--info-50); border-radius: var(--radius);
  padding: 8px 14px; margin-bottom: var(--gap);
  font-family: var(--font-body); font-size: 0.85rem; color: var(--primary);
}
.ki-scoped strong { font-weight: 700; }
.ki-scoped button {
  background: transparent; border: none; color: var(--primary);
  font-family: var(--font-heading); font-weight: 700; font-size: 0.75rem;
  cursor: pointer; text-decoration: underline;
}

/* INTERACTION CARD */
.ki-card {
  background: var(--surface); border: var(--border); border-radius: var(--radius);
  padding: 12px 14px; width: 100%;
  box-shadow: 0 1px 2px rgba(0,0,0,0.03);
}
.ki-card.is-system { background: var(--neutral-90); border-style: dashed; }
.ki-card__head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 10px; margin-bottom: 2px;
}
.ki-card__title-wrap { display: flex; align-items: flex-start; gap: 8px; min-width: 0; }
.ki-card__title-wrap svg { color: var(--primary); margin-top: 2px; flex-shrink: 0; }
.ki-card.is-system .ki-card__title-wrap svg { color: var(--neutral-40); }
.ki-card__title {
  font-family: var(--font-heading); font-weight: 500; font-size: 0.9rem;
  color: var(--primary); line-height: 1.25; word-break: break-word;
}
.ki-card.is-system .ki-card__title { color: var(--neutral-30); font-weight: 400; }
.ki-card__actions { display: flex; gap: 8px; flex-shrink: 0; }
.ki-card__actions svg { color: var(--primary); cursor: pointer; opacity: 0.6; transition: opacity 0.1s; }
.ki-card__actions svg:hover { opacity: 1; }
.ki-card__actions .pinned { opacity: 1; }
.ki-card__meta {
  font-family: var(--font-body); font-size: 0.72rem; color: var(--neutral-30);
  margin-left: 24px; margin-bottom: 4px;
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.ki-card__meta .sep { color: #ccc; }
.ki-card__meta .req { color: var(--link); cursor: pointer; }
.ki-card__body {
  font-family: var(--font-body); font-size: 0.78rem; color: var(--primary);
  line-height: 1.45; margin-left: 24px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.ki-card.is-system .ki-card__body { color: var(--neutral-30); }
.ki-card.is-pinned { border-left: 3px solid var(--primary); }
.ki-card__date-warn {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--font-body); font-size: 0.7rem; color: var(--warning-0);
  font-weight: 500;
}

/* VERTICAL TIMELINE */
.ki-vert {
  background: var(--surface); border: var(--border); border-radius: var(--radius);
  padding: 24px 20px; position: relative;
}
.ki-vert__rail { position: relative; padding-left: 28px; }
.ki-vert__rail::before {
  content: '';
  position: absolute; top: 14px; bottom: 14px; left: 9px;
  width: 2px; background: var(--neutral-60);
}
.ki-vert__month {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-heading); font-weight: 500; font-size: 0.95rem;
  color: var(--primary); background: var(--info-50);
  padding: 6px 12px; border-radius: var(--radius);
  margin-left: -28px; margin-bottom: 14px; margin-top: 6px;
}
.ki-vert__gap {
  display: flex; align-items: center; gap: 10px;
  margin-left: -10px; margin-bottom: 14px; margin-top: 6px;
}
.ki-vert__gap-dot {
  width: 8px; height: 8px; border-radius: 50%; border: 2px dashed var(--neutral-60);
  background: var(--surface);
}
.ki-vert__gap-label {
  font-family: var(--font-heading); font-weight: 700; font-size: 0.65rem;
  color: var(--neutral-40); text-transform: uppercase; letter-spacing: 0.08em;
}
.ki-vert__item { position: relative; margin-bottom: 12px; }
.ki-vert__dot {
  position: absolute; left: -26px; top: 14px;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--primary); border: 2px solid var(--surface);
  box-shadow: 0 0 0 2px var(--primary);
}
.ki-vert__dot--system {
  background: var(--surface); box-shadow: 0 0 0 2px var(--neutral-50);
}

/* EMPTY STATE */
.ki-empty {
  padding: 60px 20px; text-align: center;
  font-family: var(--font-body); color: var(--neutral-30); font-size: 0.9rem;
  background: var(--surface); border: var(--border); border-radius: var(--radius);
}
.ki-empty__title {
  font-family: var(--font-heading); font-weight: 500; font-size: 1rem;
  color: var(--primary); margin-bottom: 6px;
}

/* UNDATED INFO BANNER */
.ki-undated-info {
  background: var(--warning-50); border-radius: var(--radius);
  padding: 12px 14px; margin-bottom: var(--gap);
  font-family: var(--font-body); font-size: 0.85rem; color: var(--primary);
  display: flex; align-items: flex-start; gap: 10px;
}
.ki-undated-info svg { color: var(--warning-0); flex-shrink: 0; margin-top: 2px; }
.ki-undated-info strong { font-weight: 700; }
</style>

  'note':           { label: 'Notes',           icon: 'ic-note' },
  'phone':          { label: 'Phone',           icon: 'ic-phone' },
  'email':          { label: 'Email',           icon: 'ic-envelope' },

  'payment':        { label: 'Payments',        icon: 'ic-payment' },
  'installment':    { label: 'Installments',    icon: 'ic-installment' },
  'system-email':   { label: 'System Emails',   icon: 'ic-system' }
};
var TYPE_ORDER = ['note','phone','email','in-person','video','award','submitted-form','payment','installment','system-email'];

var state = {
  view: 'dated',
  activeTypes: { 'note': false, 'phone': false, 'email': false, 'in-person': false, 'video': false, 'award': false, 'submitted-form': false, 'payment': false, 'installment': false, 'system-email': false },
  search: '',
  scopeRange: null,
  dateRange: null
};

/* UTILS */
function pad2(n) { return n < 10 ? '0' + n : '' + n; }
function formatDate(iso) {
  if (!iso) return '';
  var p = iso.split('-');
  return p[1] + '/' + p[2] + '/' + p[0];
}
function monthKey(iso) {
  if (!iso) return null;
  return iso.split('-')[0] + '-' + iso.split('-')[1];
}
function monthLabel(key) {
  var p = key.split('-');
  var names = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return names[parseInt(p[1], 10) - 1] + ' ' + p[0];
}
function monthsBetween(keyA, keyB) {
  var a = keyA.split('-'); var b = keyB.split('-');
  return (parseInt(b[0],10) - parseInt(a[0],10)) * 12 + (parseInt(b[1],10) - parseInt(a[1],10));
}
function gapPhrase(months) {
  if (months < 1) return '';
  if (months === 1) return '1 month earlier';
  if (months < 12) return months + ' months earlier';
  var years = Math.floor(months / 12);
  var rem = months % 12;
  if (rem === 0) return years === 1 ? '1 year earlier' : years + ' years earlier';
  return years + 'y ' + rem + 'm earlier';
}
function formatDateShort(iso) {
  if (!iso) return '';
  var p = iso.split('-');
  return p[1] + '/' + p[2] + '/' + p[0].slice(2);
}

/* DATA */
function datedData() {
  var out = [];
  for (var i = 0; i < ORG_INTERACTIONS.length; i++) {
    if (ORG_INTERACTIONS[i].date) out.push(ORG_INTERACTIONS[i]);
  }
  return out;
}
function undatedData() {
  var out = [];
  for (var i = 0; i < ORG_INTERACTIONS.length; i++) {
    if (!ORG_INTERACTIONS[i].date) out.push(ORG_INTERACTIONS[i]);
  }
  return out;
}
function hasActiveTypeFilters() {
  for (var k in state.activeTypes) { if (state.activeTypes[k]) return true; }
  return false;
}
function applyFilters(items) {
  var out = [];
  var q = state.search.toLowerCase();
  var anyActive = hasActiveTypeFilters();
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    if (anyActive && !state.activeTypes[it.type]) continue;
    if (q && it.title.toLowerCase().indexOf(q) === -1 && it.body.toLowerCase().indexOf(q) === -1 && (it.author || '').toLowerCase().indexOf(q) === -1) continue;
    out.push(it);
  }
  return out;
}
function applyScopeRange(items) {
  if (!state.scopeRange) return items;
  var out = [];
  for (var i = 0; i < items.length; i++) {
    var k = monthKey(items[i].date);
    if (k >= state.scopeRange.startKey && k <= state.scopeRange.endKey) out.push(items[i]);
  }
  return out;
}
function currentDatedData() {
  var items = applyFilters(datedData());
  items = applyScopeRange(items);
  items.sort(function(a, b) { return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0); });
  return items;
}
function currentUndatedData() {
  var items = applyFilters(undatedData());
  items.sort(function(a, b) {
    var ac = a.createDate || ''; var bc = b.createDate || '';
    return ac < bc ? 1 : (ac > bc ? -1 : 0);
  });
  return items;
}
function dataSpan() {
  var src = datedData();
  if (src.length === 0) return null;
  var min = src[0].date, max = src[0].date;
  for (var i = 1; i < src.length; i++) {
    if (src[i].date < min) min = src[i].date;
    if (src[i].date > max) max = src[i].date;
  }
  return { min: monthKey(min), max: monthKey(max) };
}

/* CARDS */
function cardHtml(it) {
  var meta = TYPE_META[it.type];
  var pinClass = it.pinned ? ' is-pinned' : '';
  var sysClass = it.system ? ' is-system' : '';
  var orgRequest = it.request ? '<span class="req">' + it.request + '</span><span class="sep">|</span>' : '';
  var dateInfo = '';
  if (it.date) {
    dateInfo = '<span>' + formatDate(it.date) + '</span><span class="sep">|</span><span>' + it.author + '</span>';
  } else {
    var cd = it.createDate ? formatDate(it.createDate) : 'unknown';
    dateInfo = '<span class="ki-card__date-warn"><svg width="11" height="11"><use href="#ic-help"/></svg>Date not set</span><span class="sep">|</span><span>logged ' + cd + '</span><span class="sep">|</span><span>' + it.author + '</span>';
  }
  var pinIcon = it.pinned
    ? '<svg width="14" height="14" class="pinned"><use href="#ic-pin"/></svg>'
    : '<svg width="14" height="14"><use href="#ic-pin"/></svg>';
  return '<div class="ki-card' + pinClass + sysClass + '">' +
    '<div class="ki-card__head">' +
      '<div class="ki-card__title-wrap">' +
        '<svg width="16" height="16"><use href="#' + meta.icon + '"/></svg>' +
        '<div class="ki-card__title">' + it.title + '</div>' +
      '</div>' +
      '<div class="ki-card__actions">' + pinIcon + '</div>' +
    '</div>' +
    '<div class="ki-card__meta">' + orgRequest + dateInfo + '</div>' +
    '<div class="ki-card__body">' + it.body + '</div>' +
  '</div>';
}

/* VERTICAL TIMELINE */
function renderVertical(data) {
  if (data.length === 0) {
    return '<div class="ki-empty"><div class="ki-empty__title">No interactions match the current filters.</div>Try clearing the date range, search, or type filters above.</div>';
  }
  var html = '<div class="ki-vert"><div class="ki-vert__rail">';
  var lastKey = null;
  for (var i = 0; i < data.length; i++) {
    var it = data[i];
    var k = monthKey(it.date);
    if (k !== lastKey) {
      if (lastKey !== null) {
        var gap = monthsBetween(k, lastKey);
        var phrase = gapPhrase(gap);
        if (phrase) {
          html += '<div class="ki-vert__gap"><div class="ki-vert__gap-dot"></div><div class="ki-vert__gap-label">' + phrase + '</div></div>';
        }
      }
      html += '<div class="ki-vert__month"><svg width="13" height="13" style="color:var(--primary)"><use href="#ic-calendar"/></svg>' + monthLabel(k) + '</div>';
      lastKey = k;
    }
    var dotCls = it.system ? ' ki-vert__dot--system' : '';
    html += '<div class="ki-vert__item" id="ki-item-' + it.id + '"><div class="ki-vert__dot' + dotCls + '"></div>' + cardHtml(it) + '</div>';
  }
  html += '</div></div>';
  return html;
}

/* UNDATED VIEW */
function renderUndated() {
  var data = currentUndatedData();
  var info = '<div class="ki-undated-info"><svg width="16" height="16"><use href="#ic-info"/></svg><div><strong>These interactions don\'t have a "happened on" date.</strong> They include historical comments imported without dates and interactions where the date field was skipped. They\'re shown by their logged date as a secondary signal. You can edit any of these to add the actual interaction date.</div></div>';
  if (data.length === 0) {
    return info + '<div class="ki-empty"><div class="ki-empty__title">No undated interactions.</div>Every interaction in this view has a date set.</div>';
  }
  var html = info + '<div class="ki-vert"><div class="ki-vert__rail">';
  for (var i = 0; i < data.length; i++) {
    html += '<div class="ki-vert__item" id="ki-item-' + data[i].id + '"><div class="ki-vert__dot ki-vert__dot--system"></div>' + cardHtml(data[i]) + '</div>';
  }
  html += '</div></div>';
  return html;
}

/* TIMELINE DISPATCH */
function renderTimeline() {
  var host = document.getElementById('timeline');
  if (state.view === 'undated') {
    host.innerHTML = renderUndated();
  } else {
    host.innerHTML = renderVertical(currentDatedData());
  }
}

/* FILTER PILLS */
function renderFilterPills() {
  var host = document.getElementById('filter-pills');
  var html = '<span class="ki-filters__label">Filter by type</span>';
  var anyActive = hasActiveTypeFilters();
  html += '<button class="ki-pill' + (anyActive ? '' : ' disabled') + '" ' + (anyActive ? 'onclick="clearTypeFilters()"' : 'disabled') + '>Show all</button>';
  var counts = {};
  var datedSet = datedData();
  for (var i = 0; i < datedSet.length; i++) { counts[datedSet[i].type] = (counts[datedSet[i].type] || 0) + 1; }
  for (var j = 0; j < TYPE_ORDER.length; j++) {
    var t = TYPE_ORDER[j];
    var meta = TYPE_META[t];
    var cnt = counts[t] || 0;
    if (cnt === 0) continue;
    var active = state.activeTypes[t];
    html += '<button class="ki-pill' + (active ? ' active' : '') + '" data-type="' + t + '" onclick="togglePill(\'' + t + '\')">' +
      '<svg width="13" height="13"><use href="#' + meta.icon + '"/></svg>' + meta.label +
      '<span class="ki-pill__count">' + cnt + '</span></button>';
  }
  host.innerHTML = html;
}

function clearTypeFilters() {
  for (var k in state.activeTypes) { state.activeTypes[k] = false; }
  renderAll();
}
function togglePill(type) {
  state.activeTypes[type] = !state.activeTypes[type];
  renderAll();
}

/* VIEW SWITCH COUNTS */
function renderViewSwitchCounts() {
  document.getElementById('dated-count').textContent = applyFilters(datedData()).length;
  document.getElementById('undated-count').textContent = applyFilters(undatedData()).length;
}

/* SCOPED BANNER */
function renderScopedBanner() {
  var host = document.getElementById('scoped-banner');
  if (!state.scopeRange) { host.style.display = 'none'; host.innerHTML = ''; return; }
  host.style.display = '';
  host.className = 'ki-scoped';
  host.innerHTML = '<span>Showing interactions in <strong>' + state.scopeRange.label + '</strong> (' + currentDatedData().length + ' of ' + applyFilters(datedData()).length + ' total)</span><button onclick="clearScopeRange()">Clear range</button>';
}
function clearScopeRange() {
  state.scopeRange = null;
  state.dateRange = null;
  /* Reset the preset buttons */
  var presets = document.querySelectorAll('.ki-daterange__presets button');
  for (var i = 0; i < presets.length; i++) {
    presets[i].classList.toggle('active', presets[i].getAttribute('data-preset') === 'all');
  }
  document.getElementById('ki-daterange-label').textContent = 'All time';
  renderScopedBanner();
  renderTimeline();
}

/* DATE RANGE PRESET */
function applyDateRangePreset(preset) {
  if (preset === 'all') {
    state.dateRange = null;
    state.scopeRange = null;
    document.getElementById('ki-daterange-label').textContent = 'All time';
  } else {
    var months = parseInt(preset, 10);
    var span = dataSpan();
    if (!span) return;
    var endKey = span.max;
    var pp = endKey.split('-');
    var y = parseInt(pp[0], 10), m = parseInt(pp[1], 10);
    for (var i = 0; i < months - 1; i++) { m--; if (m < 1) { m = 12; y--; } }
    var startKey = y + '-' + pad2(m);
    var label = 'Last ' + months + ' months';
    state.dateRange = { preset: preset, label: label };
    state.scopeRange = { startKey: startKey, endKey: endKey, label: label };
    document.getElementById('ki-daterange-label').textContent = label;
  }
  /* Update active preset button */
  var presets = document.querySelectorAll('.ki-daterange__presets button');
  for (var j = 0; j < presets.length; j++) {
    presets[j].classList.toggle('active', presets[j].getAttribute('data-preset') === preset);
  }
  renderScopedBanner();
  renderTimeline();
}

function applyCustomDateRange(from, to) {
  var startKey = from ? from.substring(0, 7) : null;
  var endKey = to ? to.substring(0, 7) : null;
  if (!startKey && !endKey) return;
  var span = dataSpan();
  if (!startKey) startKey = span.min;
  if (!endKey) endKey = span.max;
  var label = formatDateShort(from) + ' to ' + formatDateShort(to);
  state.dateRange = { preset: 'custom', from: from, to: to, label: label };
  state.scopeRange = { startKey: startKey, endKey: endKey, label: label };
  document.getElementById('ki-daterange-label').textContent = label;
  /* Deactivate all presets */
  var presets = document.querySelectorAll('.ki-daterange__presets button');
  for (var i = 0; i < presets.length; i++) { presets[i].classList.remove('active'); }
  renderScopedBanner();
  renderTimeline();
}

/* RENDER ALL */
function renderAll() {
  renderFilterPills();
  renderViewSwitchCounts();
  renderScopedBanner();
  renderTimeline();
}

/* SIDEBAR ACTIVE */
function setSidebarActive(el) {
  var its = document.querySelectorAll('.ft-sidebar__item');
  for (var i = 0; i < its.length; i++) its[i].classList.remove('active');
  el.classList.add('active');
}

/* WIRE DATE RANGE PICKER */
(function() {
  var trigger = document.getElementById('ki-daterange-trigger');
  var popover = document.getElementById('ki-daterange-popover');

  trigger.onclick = function(e) {
    e.stopPropagation();
    popover.classList.toggle('open');
  };

  var presetBtns = popover.querySelectorAll('[data-preset]');
  for (var i = 0; i < presetBtns.length; i++) {
    (function(btn) {
      btn.onclick = function() {
        applyDateRangePreset(btn.getAttribute('data-preset'));
        popover.classList.remove('open');
      };
    })(presetBtns[i]);
  }

  document.getElementById('ki-date-apply').onclick = function() {
    var from = document.getElementById('ki-date-from').value;
    var to = document.getElementById('ki-date-to').value;
    if (!from && !to) return;
    applyCustomDateRange(from, to);
    popover.classList.remove('open');
  };

  document.addEventListener('click', function(e) {
    if (!popover.contains(e.target) && !trigger.contains(e.target)) {
      popover.classList.remove('open');
    }
  });
})();

/* WIRE VIEW SWITCH */
(function() {
  var btns = document.querySelectorAll('#view-switch button');
  for (var i = 0; i < btns.length; i++) {
    (function(b) {
      b.addEventListener('click', function() {
        state.view = b.getAttribute('data-view');
        var all = document.querySelectorAll('#view-switch button');
        for (var j = 0; j < all.length; j++) all[j].classList.remove('active');
        b.classList.add('active');
        renderAll();
      });
    })(btns[i]);
  }
})();

/* SEARCH */
document.getElementById('search-input').addEventListener('input', function(e) {
  state.search = e.target.value;
  renderAll();
});

/* GO */
renderAll();
</script>
</body>
</html>
